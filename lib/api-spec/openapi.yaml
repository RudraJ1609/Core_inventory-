openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Inventory Management System API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: items
    description: Inventory item operations
  - name: history
    description: Stock history operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/signup:
    post:
      operationId: signup
      tags: [auth]
      summary: Create a new account and auto-login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SignupBody"
      responses:
        "201":
          description: Account created and logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "409":
          description: Username already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login with username and password
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginBody"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout current session
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResult"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current authenticated user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Not authenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /items:
    get:
      operationId: listItems
      tags: [items]
      summary: List all inventory items
      parameters:
        - name: search
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: List of inventory items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/InventoryItem"
    post:
      operationId: createItem
      tags: [items]
      summary: Create a new inventory item (Manager only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateItemBody"
      responses:
        "201":
          description: Created item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"

  /items/{id}:
    get:
      operationId: getItem
      tags: [items]
      summary: Get a single inventory item
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Inventory item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"
        "404":
          description: Item not found
    put:
      operationId: updateItem
      tags: [items]
      summary: Update an inventory item (Manager only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateItemBody"
      responses:
        "200":
          description: Updated item
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InventoryItem"
        "404":
          description: Item not found
    delete:
      operationId: deleteItem
      tags: [items]
      summary: Delete an inventory item (Manager only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeleteResult"
        "404":
          description: Item not found

  /history:
    get:
      operationId: listHistory
      tags: [history]
      summary: List stock history events
      parameters:
        - name: itemId
          in: query
          required: false
          schema:
            type: integer
      responses:
        "200":
          description: List of history events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HistoryEvent"

  /dashboard:
    get:
      operationId: getDashboard
      tags: [items]
      summary: Get dashboard summary stats
      responses:
        "200":
          description: Dashboard stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardStats"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required: [status]

    SignupBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]

    LoginBody:
      type: object
      properties:
        username:
          type: string
        password:
          type: string
      required: [username, password]

    AuthUser:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        role:
          type: string
          enum: [manager, guest]
      required: [id, username, role]

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required: [error]

    SuccessResult:
      type: object
      properties:
        success:
          type: boolean
      required: [success]

    InventoryItem:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        quantity:
          type: integer
        price:
          type: number
        category:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
      required: [id, name, quantity, price, category, createdAt, updatedAt]

    CreateItemBody:
      type: object
      properties:
        name:
          type: string
        quantity:
          type: integer
        price:
          type: number
        category:
          type: string
      required: [name, quantity, price, category]

    UpdateItemBody:
      type: object
      properties:
        name:
          type: string
        quantity:
          type: integer
        price:
          type: number
        category:
          type: string

    DeleteResult:
      type: object
      properties:
        success:
          type: boolean
      required: [success]

    HistoryEvent:
      type: object
      properties:
        id:
          type: integer
        itemId:
          type: integer
        itemName:
          type: string
        action:
          type: string
          enum: [created, updated, deleted, stock_added, stock_removed]
        quantityBefore:
          type: integer
          nullable: true
        quantityAfter:
          type: integer
          nullable: true
        note:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
      required: [id, itemId, itemName, action, createdAt]

    DashboardStats:
      type: object
      properties:
        totalItems:
          type: integer
        totalStockValue:
          type: number
        lowStockItems:
          type: array
          items:
            $ref: "#/components/schemas/InventoryItem"
        totalCategories:
          type: integer
      required: [totalItems, totalStockValue, lowStockItems, totalCategories]
